# bupd ftw
set-option -sa terminal-overrides ",xterm*:Tc"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# use Ctrl-k for the prefix.
unbind C-b
unbind C-j
set-option -g prefix C-k
bind-key C-k send-prefix
# set-option -g prefix2 C-f 
set -g mouse on

# Tmux Reload with prefix and r.
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

# Status bar colors
set -g status-style "bg=colour236,fg=colour252"
set -g status-left-style "bg=colour236,fg=colour252"
set -g status-right-style "bg=colour236,fg=colour252"
set -g window-status-style "bg=colour236,fg=colour247"
set -g window-status-current-style "bg=colour33,fg=black,bold"
set -g message-style "bg=colour33,fg=black"
set -g message-command-style "bg=black,fg=colour81"

# Set easier window split keys
bind-key v split-window -h -c "#{pane_current_path}"
bind-key h split-window -v -c "#{pane_current_path}"

  # for neovim resurrect
  set -g @resurrect-strategy-nvim 'session'
  set -g @resurrect-capture-pane-contents 'on'

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# bind -n M-H  previous-window
# bind -n M-L  next-window

# Easily reorder windows with CTRL+SHIFT+Arrow
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1
bind-key C-j run-shell "tmux neww sessionizer"

bind-key -r n new-session


# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on


# Synchronize panes
bind-key y set-window-option synchronize-panes\; display-message "synchronize mode toggled."
# Mouse mode ON set -g mouse on
run '~/.tmux/plugins/tpm/tpm'
# set vi-mode

set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Keep Ctrl-h/j/k/l reserved from root-level plugin bindings on this machine.
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# increase scroll-back history
set -g history-limit 15000
