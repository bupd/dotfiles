name: Build Bootc Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.REGISTRY }}
  REGISTRY_PROJECT: ${{ vars.REGISTRY_PROJECT }}
  REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install podman
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Restore podman build cache
        uses: actions/cache@v4
        with:
          path: /var/lib/containers/storage
          key: podman-build-${{ hashFiles('bootc/Containerfile', 'bootc/Containerfile.base', 'bootc/files/*') }}
          restore-keys: |
            podman-build-

      - name: Login to registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          podman login "$REGISTRY" \
            -u "$REGISTRY_USERNAME" \
            -p "$REGISTRY_PASSWORD"

      - name: Build base image
        run: |
          podman build --network=host \
            -f bootc/Containerfile.base \
            -t arch-bootc:latest \
            bootc/

      - name: Tag base image
        run: podman tag arch-bootc:latest ghcr.io/bootcrew/arch-bootc:latest

      - name: Download k3s binary
        run: |
          K3S_VERSION=$(curl -sfL https://update.k3s.io/v1-release/channels | jq -r '.data[] | select(.id=="stable") | .latest')
          curl -sfL -o bootc/k3s "https://github.com/k3s-io/k3s/releases/download/$(echo $K3S_VERSION | sed 's/+/%2B/g')/k3s"
          chmod +x bootc/k3s

      - name: Build hetzner image
        run: |
          podman build --network=host \
            -f bootc/Containerfile \
            -t "$REGISTRY/$REGISTRY_PROJECT:latest" \
            bootc/

      - name: Push image
        run: podman push "$REGISTRY/$REGISTRY_PROJECT:latest"

  disk:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore oras cache
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/oras
          key: oras-1.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y podman zstd
          if [ ! -f /usr/local/bin/oras ]; then
            ORAS_VERSION="1.2.2"
            curl -sLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
            tar -xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" oras
            sudo mv oras /usr/local/bin/
          fi

      - name: Login to registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          podman login "$REGISTRY" \
            -u "$REGISTRY_USERNAME" \
            -p "$REGISTRY_PASSWORD"
          oras login "$REGISTRY" \
            -u "$REGISTRY_USERNAME" \
            -p "$REGISTRY_PASSWORD"

      - name: Pull container image
        run: podman pull "$REGISTRY/$REGISTRY_PROJECT:latest"

      - name: Generate bootable disk image
        run: |
          fallocate -l 20G bootable.img
          sudo podman run \
            --rm --privileged --pid=host --network=host \
            -v /var/lib/containers:/var/lib/containers \
            -v /etc/containers:/etc/containers \
            -v /dev:/dev \
            -v "$(pwd):/data" \
            "$REGISTRY/$REGISTRY_PROJECT:latest" \
            bootc install to-disk \
            --composefs-backend \
            --via-loopback /data/bootable.img \
            --filesystem ext4 \
            --wipe \
            --bootloader systemd

      - name: Compress and push disk image
        run: |
          zstd bootable.img -o bootable.img.zst
          oras push "$REGISTRY/$REGISTRY_PROJECT:disk-latest" \
            bootable.img.zst:application/octet-stream
