# Include Patterns - Modular Taskfile organization
version: '3'

# =============================================================================
# BASIC INCLUDES
# =============================================================================

includes:
  # Simple include - looks for ./docker/Taskfile.yml
  docker: ./docker
  
  # Explicit path
  backend: ./services/backend/Taskfile.yml


# =============================================================================
# ADVANCED INCLUDE OPTIONS
# =============================================================================

includes:
  # Full configuration
  frontend:
    taskfile: ./services/frontend
    dir: ./services/frontend  # Run tasks in this directory
    optional: true             # Don't error if missing
    flatten: false             # Keep namespace prefix
    internal: false            # Show in --list
    aliases: [fe, web]         # Alternative names
    excludes:                  # Tasks to exclude
      - internal-helper
      - debug-task
    vars:                      # Pass variables
      SERVICE_NAME: frontend
      PORT: 3000

  # Flatten - no namespace required
  common:
    taskfile: ./common.yml
    flatten: true  # Call tasks directly without 'common:' prefix

  # Internal - hidden from CLI
  utils:
    taskfile: ./utils.yml
    internal: true  # Tasks not visible in --list


# =============================================================================
# VARIABLE PASSING TO INCLUDES
# =============================================================================

includes:
  deploy-staging:
    taskfile: ./deploy.yml
    vars:
      ENVIRONMENT: staging
      REPLICAS: 3
  
  deploy-prod:
    taskfile: ./deploy.yml
    vars:
      ENVIRONMENT: production
      REPLICAS: 10


# =============================================================================
# NESTED INCLUDES - Multi-level hierarchy
# =============================================================================

# Root Taskfile
includes:
  api:
    taskfile: ./services/api/Taskfile.yml

# ./services/api/Taskfile.yml includes:
#   database:
#     taskfile: ../shared/database.yml

# Call nested tasks:
tasks:
  setup:
    cmds:
      - task: api:database:migrate  # Call through hierarchy


# =============================================================================
# CALLING ROOT TASKS FROM INCLUDES
# =============================================================================

# Root Taskfile
tasks:
  root-task:
    cmds:
      - echo "Root task"

# Included Taskfile can call root task with ':'
# included/Taskfile.yml:
#   tasks:
#     child-task:
#       cmds:
#         - task: :root-task  # Note the leading ':'


# =============================================================================
# DYNAMIC INCLUDES - OS-specific
# =============================================================================

includes:
  # Include OS-specific Taskfile
  build: ./build/Taskfile_{{OS}}.yml  # _linux, _darwin, _windows


# =============================================================================
# MONOREPO PATTERN - Service isolation
# =============================================================================

includes:
  api:
    taskfile: ./services/api
    dir: ./services/api
    vars:
      SERVICE: api
      PORT: 8080
  
  web:
    taskfile: ./services/web
    dir: ./services/web
    vars:
      SERVICE: web
      PORT: 3000
  
  worker:
    taskfile: ./services/worker
    dir: ./services/worker
    vars:
      SERVICE: worker

tasks:
  # Start all services
  start:all:
    deps:
      - api:start
      - web:start
      - worker:start

  # Test all services
  test:all:
    cmds:
      - task: api:test
      - task: web:test
      - task: worker:test


# =============================================================================
# SHARED CONFIGURATION PATTERN
# =============================================================================

# Root Taskfile.yml
includes:
  shared:
    taskfile: ./shared/Taskfile.yml
    flatten: true  # Make shared tasks available everywhere

vars:
  PROJECT_NAME: myproject
  VERSION: 1.0.0

# shared/Taskfile.yml contains common tasks:
#   - lint
#   - format
#   - security-scan
#   - docker-build

tasks:
  # Use shared tasks
  prepare:
    cmds:
      - task: lint      # From shared, no prefix needed
      - task: format
      - task: security-scan


# =============================================================================
# ENVIRONMENT-SPECIFIC PATTERN
# =============================================================================

includes:
  dev:
    taskfile: ./config/dev.yml
    vars:
      ENV: development
  
  staging:
    taskfile: ./config/staging.yml
    vars:
      ENV: staging
  
  prod:
    taskfile: ./config/prod.yml
    vars:
      ENV: production

tasks:
  deploy:
    cmds:
      - task: {{.ENVIRONMENT}}:deploy
    requires:
      vars:
        - name: ENVIRONMENT
          enum: [dev, staging, prod]


# =============================================================================
# OPTIONAL INCLUDES - Graceful degradation
# =============================================================================

includes:
  # Optional local overrides
  local:
    taskfile: ./Taskfile.local.yml
    optional: true  # Don't error if missing
  
  # Optional secrets
  secrets:
    taskfile: ./secrets/Taskfile.yml
    optional: true

tasks:
  deploy:
    cmds:
      # Use local:custom-deploy if available, otherwise default
      - task: local:custom-deploy || task: default-deploy


# =============================================================================
# CHECKSUM VERIFICATION - Remote Taskfiles
# =============================================================================

includes:
  remote:
    taskfile: https://example.com/shared-tasks.yml
    checksum: c153e97e0b3a998a7ed2e61064c6ddaddd0de0c525feefd6bba8569827d8efe9


# =============================================================================
# COMPLETE MONOREPO EXAMPLE
# =============================================================================

version: '3'

includes:
  # Infrastructure
  infra:
    taskfile: ./infra
    dir: ./infra
    internal: true

  # Shared utilities
  common:
    taskfile: ./common
    flatten: true
  
  # Services
  api:
    taskfile: ./services/api
    dir: ./services/api
    aliases: [backend]
    vars: {SERVICE: api}
  
  web:
    taskfile: ./services/web
    dir: ./services/web
    aliases: [frontend]
    vars: {SERVICE: web}
  
  worker:
    taskfile: ./services/worker
    dir: ./services/worker
    vars: {SERVICE: worker}

vars:
  DOCKER_REGISTRY: myregistry.io
  VERSION: 1.0.0

tasks:
  # Development
  dev:
    desc: Start all services in development mode
    deps:
      - api:dev
      - web:dev
      - worker:dev

  # Testing
  test:
    desc: Run tests for all services
    cmds:
      - task: api:test
      - task: web:test
      - task: worker:test

  # Building
  build:all:
    desc: Build all services
    cmds:
      - for: [api, web, worker]
        task: '{{.ITEM}}:build'

  # Deployment
  deploy:all:
    desc: Deploy all services
    deps:
      - infra:setup  # Hidden infrastructure setup
    cmds:
      - for: [api, web, worker]
        task: '{{.ITEM}}:deploy'

  # Common utilities (from flattened include)
  # - lint
  # - format
  # - security-scan
  # All available directly without prefix
