# CI/CD Integration Patterns
version: '3'

# Configure output for CI systems
output:
  group:
    begin: '::group::{{.TASK}}'  # GitHub Actions format
    end: '::endgroup::'
    error_only: false

vars:
  CI: '{{default "false" .CI}}'
  BRANCH: '{{default "main" .GITHUB_REF_NAME}}'

tasks:
  # CI Entry Point
  ci:
    desc: Complete CI pipeline
    cmds:
      - task: ci:validate
      - task: ci:test
      - task: ci:build
      - task: ci:security

  # Validation stage
  ci:validate:
    desc: Run all validation checks
    deps: [lint, format:check]
    cmds:
      - echo "✓ Validation passed"

  lint:
    desc: Run linting
    cmds:
      - golangci-lint run ./...
    silent: true

  format:check:
    desc: Check code formatting
    cmds:
      - test -z "$(gofmt -l .)"
    silent: true

  # Testing stage with coverage
  ci:test:
    desc: Run tests with coverage
    cmds:
      - go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - go tool cover -func=coverage.out
    generates:
      - coverage.out

  ci:test:upload-coverage:
    desc: Upload coverage to Codecov
    deps: [ci:test]
    preconditions:
      - sh: test -n "$CODECOV_TOKEN"
        msg: "CODECOV_TOKEN not set"
    cmds:
      - bash <(curl -s https://codecov.io/bash)

  # Build stage
  ci:build:
    desc: Build application
    cmds:
      - task: build:prod

  build:prod:
    desc: Production build with optimizations
    cmds:
      - go build -ldflags="-s -w -X main.Version={{.VERSION}}" -o bin/app

  # Security checks
  ci:security:
    desc: Run security scans
    cmds:
      - task: security:gosec
      - task: security:dependencies

  security:gosec:
    desc: Run gosec security scanner
    cmds:
      - gosec ./...

  security:dependencies:
    desc: Check for vulnerable dependencies
    cmds:
      - go list -json -m all | nancy sleuth

  # Release tasks
  release:check:
    desc: Verify release prerequisites
    preconditions:
      - sh: test -n "${{.GITHUB_TOKEN}}"
        msg: "GITHUB_TOKEN required for release"
      - sh: 'git diff-index --quiet HEAD'
        msg: "Working directory must be clean"

  release:tag:
    desc: Create and push release tag
    deps: [release:check]
    requires:
      vars: [VERSION]
    cmds:
      - git tag -a v{{.VERSION}} -m "Release v{{.VERSION}}"
      - git push origin v{{.VERSION}}

  # Deployment tasks with environment validation
  deploy:
    desc: Deploy to environment
    requires:
      vars:
        - name: ENVIRONMENT
          enum: [dev, staging, production]
    preconditions:
      - sh: test -n "$DEPLOY_KEY"
        msg: "DEPLOY_KEY required"
    cmds:
      - task: deploy:{{.ENVIRONMENT}}

  deploy:dev:
    internal: true
    cmds:
      - echo "Deploying to dev..."
      - ./scripts/deploy.sh dev

  deploy:staging:
    internal: true
    cmds:
      - echo "Deploying to staging..."
      - ./scripts/deploy.sh staging

  deploy:production:
    internal: true
    prompt: "Deploy to PRODUCTION?"
    cmds:
      - echo "Deploying to production..."
      - ./scripts/deploy.sh production

  # Docker build for CI
  docker:build:ci:
    desc: Build Docker image with CI tags
    vars:
      IMAGE: '{{default "myapp" .IMAGE}}'
      TAG: '{{default "latest" .TAG}}'
    cmds:
      - docker build --build-arg VERSION={{.VERSION}} -t {{.IMAGE}}:{{.TAG}} .
      - docker tag {{.IMAGE}}:{{.TAG}} {{.IMAGE}}:{{.GITHUB_SHA}}

  docker:push:
    desc: Push Docker image
    deps: [docker:build:ci]
    preconditions:
      - sh: test -n "$DOCKER_USERNAME"
      - sh: test -n "$DOCKER_PASSWORD"
    cmds:
      - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      - docker push {{.IMAGE}}:{{.TAG}}
      - docker push {{.IMAGE}}:{{.GITHUB_SHA}}

  # Cleanup
  ci:cleanup:
    desc: Cleanup CI artifacts
    cmds:
      - rm -rf bin/ dist/ coverage.out
      - docker system prune -f
