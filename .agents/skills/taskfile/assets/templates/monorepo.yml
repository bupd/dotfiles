# Monorepo with multiple services
version: '3'

vars:
  SERVICES: [api, web, worker]

env:
  DOCKER_BUILDKIT: 1

tasks:
  default:
    desc: Show all services
    cmds:
      - echo "Available services: {{.SERVICES}}"
      - task --list

  # Install all service dependencies
  install:
    desc: Install dependencies for all services
    deps:
      - for: { var: SERVICES }
        task: install:service
        vars: { SERVICE: '{{.ITEM}}' }

  install:service:
    internal: true
    dir: 'services/{{.SERVICE}}'
    sources:
      - package.json
      - go.mod
    cmds:
      - |
        if [ -f package.json ]; then
          npm install
        elif [ -f go.mod ]; then
          go mod download
        fi

  # Service-specific tasks using wildcard
  dev:*:
    desc: Start development server for service
    vars:
      SERVICE: '{{index .MATCH 0}}'
    dir: 'services/{{.SERVICE}}'
    cmds:
      - task: :check-service
        vars: { SERVICE: '{{.SERVICE}}' }
      - task -d services/{{.SERVICE}} dev

  build:*:
    desc: Build specific service
    vars:
      SERVICE: '{{index .MATCH 0}}'
    dir: 'services/{{.SERVICE}}'
    cmds:
      - task: :check-service
        vars: { SERVICE: '{{.SERVICE}}' }
      - task -d services/{{.SERVICE}} build

  test:*:
    desc: Test specific service
    vars:
      SERVICE: '{{index .MATCH 0}}'
    dir: 'services/{{.SERVICE}}'
    cmds:
      - task: :check-service
        vars: { SERVICE: '{{.SERVICE}}' }
      - task -d services/{{.SERVICE}} test

  # Build all services
  build:all:
    desc: Build all services
    deps:
      - for: { var: SERVICES }
        task: build:service
        vars: { SERVICE: '{{.ITEM}}' }

  build:service:
    internal: true
    dir: 'services/{{.SERVICE}}'
    cmds:
      - echo "Building {{.SERVICE}}..."
      - task -d services/{{.SERVICE}} build

  # Test all services
  test:all:
    desc: Run tests for all services
    deps:
      - for: { var: SERVICES }
        task: test:service
        vars: { SERVICE: '{{.ITEM}}' }

  test:service:
    internal: true
    dir: 'services/{{.SERVICE}}'
    cmds:
      - echo "Testing {{.SERVICE}}..."
      - task -d services/{{.SERVICE}} test

  # Lint all services
  lint:all:
    desc: Lint all services
    deps:
      - for: { var: SERVICES }
        task: lint:service
        vars: { SERVICE: '{{.ITEM}}' }

  lint:service:
    internal: true
    dir: 'services/{{.SERVICE}}'
    cmds:
      - task -d services/{{.SERVICE}} lint

  # Docker operations
  docker:build:*:
    desc: Build Docker image for service
    vars:
      SERVICE: '{{index .MATCH 0}}'
    cmds:
      - docker build -t {{.SERVICE}}:latest ./services/{{.SERVICE}}

  docker:build:all:
    desc: Build Docker images for all services
    cmds:
      - for: { var: SERVICES, as: SERVICE }
        cmd: docker build -t {{.SERVICE}}:latest ./services/{{.SERVICE}}

  # Compose operations
  compose:up:
    desc: Start all services with docker-compose
    cmds:
      - docker-compose up -d

  compose:down:
    desc: Stop all services
    cmds:
      - docker-compose down

  compose:logs:*:
    desc: View logs for specific service
    vars:
      SERVICE: '{{index .MATCH 0}}'
    cmds:
      - docker-compose logs -f {{.SERVICE}}

  # Utilities
  check-service:
    internal: true
    preconditions:
      - sh: 'echo "{{.SERVICES}}" | grep -w "{{.SERVICE}}"'
        msg: 'Service "{{.SERVICE}}" not found. Available: {{.SERVICES}}'

  clean:
    desc: Clean all build artifacts
    cmds:
      - for: { var: SERVICES, as: SERVICE }
        cmd: task -d services/{{.SERVICE}} clean || true
      - rm -rf dist/ node_modules/

  workspace:status:
    desc: Show git status for all services
    cmds:
      - for: { var: SERVICES, as: SERVICE }
        cmd: |
          echo "=== {{.SERVICE}} ==="
          cd services/{{.SERVICE}} && git status -s || echo "Not a git repo"
          echo ""
