# Docker Compose service management
version: '3'

vars:
  COMPOSE_FILE: docker-compose.yml
  PROJECT_NAME: '{{default "myproject" .PROJECT_NAME}}'

tasks:
  default:
    desc: Show available services
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} ps

  up:
    desc: Start all services
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} up -d

  up:*:
    desc: Start specific service
    vars:
      SERVICE: '{{index .MATCH 0}}'
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} up -d {{.SERVICE}}

  down:
    desc: Stop all services
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} down

  restart:
    desc: Restart all services
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} restart

  restart:*:
    desc: Restart specific service
    vars:
      SERVICE: '{{index .MATCH 0}}'
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} restart {{.SERVICE}}

  logs:
    desc: View logs from all services
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} logs -f

  logs:*:
    desc: View logs from specific service
    vars:
      SERVICE: '{{index .MATCH 0}}'
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} logs -f {{.SERVICE}}

  ps:
    desc: List running services
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} ps

  build:
    desc: Build all services
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} build

  build:*:
    desc: Build specific service
    vars:
      SERVICE: '{{index .MATCH 0}}'
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} build {{.SERVICE}}

  clean:
    desc: Stop and remove all containers, networks, and volumes
    prompt: This will remove all containers, networks, and volumes. Continue?
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} down -v
      - docker system prune -f

  exec:*:
    desc: Execute command in service (e.g., task exec:db:psql)
    vars:
      SERVICE: '{{index .MATCH 0}}'
      CMD: '{{index .MATCH 1}}'
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} exec {{.SERVICE}} {{.CMD}}

  shell:*:
    desc: Open shell in service
    vars:
      SERVICE: '{{index .MATCH 0}}'
    cmds:
      - docker-compose -f {{.COMPOSE_FILE}} exec {{.SERVICE}} /bin/sh
