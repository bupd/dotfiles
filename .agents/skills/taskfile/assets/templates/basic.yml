# Minimal Taskfile starter
version: '3'

vars:
  APP_NAME: myapp
  VERSION: 1.0.0

tasks:
  default:
    desc: Run the default build
    cmds:
      - task: build

  build:
    desc: Build the application
    sources:
      - 'src/**/*.go'
      - 'go.mod'
    generates:
      - './bin/{{.APP_NAME}}'
    cmds:
      - mkdir -p bin
      - go build -o bin/{{.APP_NAME}} ./cmd

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
