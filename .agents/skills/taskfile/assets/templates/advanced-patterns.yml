# Advanced Taskfile Patterns - Real-world examples
version: '3'

# =============================================================================
# WILDCARDS - Dynamic task matching
# =============================================================================

tasks:
  # Match single wildcard: task start:api
  start:*:
    vars:
      SERVICE: '{{index .MATCH 0}}'
    cmds:
      - echo "Starting service: {{.SERVICE}}"
      - docker-compose up -d {{.SERVICE}}

  # Match multiple wildcards: task deploy:staging:api
  deploy:*:*:
    vars:
      ENV: '{{index .MATCH 0}}'
      SERVICE: '{{index .MATCH 1}}'
    preconditions:
      - sh: test "{{.ENV}}" = "staging" -o "{{.ENV}}" = "production"
        msg: 'Environment must be staging or production'
    cmds:
      - echo "Deploying {{.SERVICE}} to {{.ENV}}"
      - ./deploy.sh {{.ENV}} {{.SERVICE}}

  # Wildcard at different positions: task frontend-build:prod
  '*-build:*':
    vars:
      APP: '{{index .MATCH 0}}'
      TARGET: '{{index .MATCH 1}}'
    cmds:
      - echo "Building {{.APP}} for {{.TARGET}}"


# =============================================================================
# COMPLEX VARIABLES - Maps, refs, JSON parsing
# =============================================================================

  print-config:
    vars:
      # Map variable with nested structure
      CONFIG:
        map:
          database:
            host: localhost
            port: 5432
            name: mydb
          cache:
            type: redis
            ttl: 3600
    cmds:
      - echo "Database: {{.CONFIG.database.host}}:{{.CONFIG.database.port}}"
      - echo "Cache type: {{.CONFIG.cache.type}}"

  process-json:
    vars:
      # Parse JSON from command output
      JSON_STRING:
        sh: echo '{"name":"Alice","age":30,"children":[{"name":"Bob","age":5}]}'
      # Convert to structured data
      DATA:
        ref: 'fromJson .JSON_STRING'
    cmds:
      - echo "Name: {{.DATA.name}}, Age: {{.DATA.age}}"
      - echo "First child: {{(index .DATA.children 0).name}}"

  pass-by-reference:
    vars:
      ARRAY: [foo, bar, baz]
    cmds:
      # Pass array by reference (not string)
      - task: process-array
        vars:
          ITEMS:
            ref: .ARRAY

  process-array:
    cmds:
      - echo "First: {{index .ITEMS 0}}"
      - echo "Count: {{len .ITEMS}}"


# =============================================================================
# VARIABLE DEPENDENCIES - Chained resolution
# =============================================================================

vars:
  VAR_A: A
  VAR_B: '{{.VAR_A}}B'
  VAR_C: '{{.VAR_B}}C'
  VAR_1: {sh: echo 1}
  VAR_2: {sh: 'echo "{{.VAR_1}}2"'}

tasks:
  show-chained-vars:
    vars:
      VAR_D: '{{.VAR_C}}D'
      VAR_E: '{{.VAR_D}}E'
    cmds:
      - echo '{{.VAR_E}}'  # Outputs: ABCDE


# =============================================================================
# ERROR HANDLING - Output control
# =============================================================================

output:
  group:
    error_only: true  # Only show output on failure

tasks:
  test-all:
    cmds:
      - task: unit-tests
      - task: integration-tests
      - task: e2e-tests

  unit-tests:
    cmds:
      - echo "Running unit tests..."
      - go test ./...

  integration-tests:
    cmds:
      - echo "Running integration tests..."
      - go test -tags=integration ./...


# =============================================================================
# SHELL OPTIONS - Different levels
# =============================================================================

# Global settings
set: [errexit, pipefail]
shopt: [globstar]

tasks:
  # Task-level override
  tolerant-task:
    set: []  # No errexit for this task
    cmds:
      - command_that_might_fail || echo "Failed but continuing"

  # Command-level override
  mixed-task:
    cmds:
      - cmd: echo **/*.go  # Uses global globstar
      - cmd: risky_command
        set: []  # No errexit just for this command
        ignore_error: true


# =============================================================================
# LOOP PATTERNS - All variations
# =============================================================================

  # Loop over static list
  greet-all:
    cmds:
      - for: [Alice, Bob, Charlie]
        cmd: echo "Hello {{.ITEM}}"

  # Loop over matrix (cross-product)
  build-matrix:
    cmds:
      - for:
          matrix:
            OS: [linux, darwin, windows]
            ARCH: [amd64, arm64]
        cmd: echo "Building for {{.ITEM.OS}}/{{.ITEM.ARCH}}"

  # Loop over variable (comma-separated)
  process-files:
    vars:
      FILES: 'file1.txt,file2.txt,file3.txt'
    cmds:
      - for:
          var: FILES
          split: ','
          as: FILE
        cmd: cat {{.FILE}}

  # Loop over sources (glob)
  convert-images:
    sources:
      - '*.png'
    cmds:
      - for: sources
        cmd: convert {{.ITEM}} {{.ITEM}}.jpg

  # Loop over command output
  process-todos:
    vars:
      TODO_FILES:
        sh: find . -name "TODO.md"
    cmds:
      - for: { var: TODO_FILES }
        cmd: cat {{.ITEM}}

  # Loop in dependencies
  test-services:
    deps:
      - for: [api, web, worker]
        task: test-service
        vars:
          SERVICE: '{{.ITEM}}'


# =============================================================================
# RUN CONTROL - Execution frequency
# =============================================================================

run: when_changed  # Global default

tasks:
  expensive-setup:
    run: once  # Only runs once even if called multiple times
    cmds:
      - echo "Downloading dependencies..."
      - npm install

  generate-hash:
    run: when_changed  # Runs once per unique variable set
    cmds:
      - echo "{{.CONTENT}}" | sha256sum

  deploy:*:
    run: once  # Each wildcard match runs once
    cmd: echo "Deploying {{index .MATCH 0}}"


# =============================================================================
# REQUIRES - Variable validation with enums
# =============================================================================

  deploy-with-validation:
    requires:
      vars:
        - API_KEY
        - DATABASE_URL
        - name: ENVIRONMENT
          enum: [development, staging, production]
        - name: LOG_LEVEL
          enum: [debug, info, warn, error]
    cmds:
      - echo "Deploying to {{.ENVIRONMENT}}"
      - ./deploy.sh


# =============================================================================
# DEFER - Cleanup that always runs
# =============================================================================

  with-cleanup:
    cmds:
      - mkdir -p tmp/build
      - defer: rm -rf tmp/build
      - echo "Working in tmp..."
      - exit 1  # Cleanup still runs!

  with-exit-code:
    cmds:
      - go test ./...
      - defer: |
          {{if .EXIT_CODE}}
            echo "Tests failed with code {{.EXIT_CODE}}"
            ./notify-failure.sh
          {{else}}
            echo "All tests passed!"
          {{end}}
