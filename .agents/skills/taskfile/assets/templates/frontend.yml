# Node.js/Frontend project
version: '3'

vars:
  NODE_ENV: '{{default "development" .NODE_ENV}}'
  PORT: '{{default "3000" .PORT}}'

tasks:
  default:
    desc: Install and run development server
    cmds:
      - task: install
      - task: dev

  install:
    desc: Install npm dependencies
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.installed
    cmds:
      - npm install
      - touch node_modules/.installed

  dev:
    desc: Start development server with hot reload
    deps: [install]
    watch: true
    sources:
      - 'src/**/*'
    cmds:
      - npm run dev

  build:
    desc: Build for production
    deps: [install, lint]
    sources:
      - 'src/**/*'
      - 'public/**/*'
      - tsconfig.json
    generates:
      - 'dist/**/*'
    cmds:
      - npm run build

  build:analyze:
    desc: Build and analyze bundle size
    deps: [build]
    cmds:
      - npm run build -- --analyze

  lint:
    desc: Run ESLint
    deps: [install]
    sources:
      - 'src/**/*.{js,jsx,ts,tsx}'
      - '.eslintrc.*'
    cmds:
      - npm run lint

  lint:fix:
    desc: Fix linting issues automatically
    deps: [install]
    cmds:
      - npm run lint -- --fix

  format:
    desc: Format code with Prettier
    deps: [install]
    cmds:
      - npm run format

  format:check:
    desc: Check code formatting
    deps: [install]
    cmds:
      - npm run format -- --check

  test:
    desc: Run tests
    deps: [install]
    cmds:
      - npm test

  test:watch:
    desc: Run tests in watch mode
    deps: [install]
    cmds:
      - npm test -- --watch

  test:coverage:
    desc: Run tests with coverage
    deps: [install]
    cmds:
      - npm test -- --coverage

  type-check:
    desc: Run TypeScript type checking
    deps: [install]
    sources:
      - 'src/**/*.{ts,tsx}'
      - tsconfig.json
    cmds:
      - npx tsc --noEmit

  preview:
    desc: Preview production build
    deps: [build]
    cmds:
      - npm run preview

  clean:
    desc: Clean build artifacts and node_modules
    cmds:
      - rm -rf dist/ node_modules/ .next/ .nuxt/

  upgrade:
    desc: Check for outdated packages
    cmds:
      - npm outdated

  upgrade:interactive:
    desc: Interactively upgrade packages
    cmds:
      - npx npm-check-updates --interactive
